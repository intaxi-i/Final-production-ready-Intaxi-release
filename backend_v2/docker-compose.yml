services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: intaxi_v2
      POSTGRES_USER: intaxi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-intaxi_change_me}
    volumes:
      - intaxi_v2_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intaxi -d intaxi_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  intaxi_v2_postgres:
